<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFF9F6; }
        .modal-bg { background-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <header class="bg-gradient-to-r from-[#E31E24] to-[#FF5F1F] px-8 py-3 text-white flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2 font-bold tracking-tighter">KADAMBAAS</div>
        <div class="text-sm">
            <a href="/admin" class="opacity-80 hover:underline">Dashboard</a> / Manage Orders
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-4xl font-bold text-[#1A2B48]">Manage Orders</h2>
            <button onclick="openOrderModal()" class="bg-[#FF5F1F] text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-[#E31E24] transition">+ New Order</button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="bg-orange-500 p-2 rounded-lg text-white font-bold">📦</div>
                <div><p class="text-xs text-gray-400">Total</p><p id="count-total" class="text-xl font-bold">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="bg-yellow-500 p-2 rounded-lg text-white">⏳</div>
                <div><p class="text-xs text-gray-400">Pending</p><p id="count-pending" class="text-xl font-bold">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="bg-blue-500 p-2 rounded-lg text-white">🚚</div>
                <div><p class="text-xs text-gray-400">Transit</p><p id="count-transit" class="text-xl font-bold">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="bg-green-500 p-2 rounded-lg text-white">✅</div>
                <div><p class="text-xs text-gray-400">Done</p><p id="count-done" class="text-xl font-bold">0</p></div>
            </div>
        </div>

        <div class="relative mb-8">
            <input type="text" id="orderSearch" onkeyup="filterOrders()" placeholder="Search by order ID or customer name..." class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm outline-none focus:ring-2 focus:ring-orange-400">
            <span class="absolute left-4 top-4 text-gray-400">🔍</span>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Order ID</th>
                        <th class="px-6 py-4">Customer</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="orderList">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="orderModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-2xl font-bold text-[#1A2B48] mb-6">Create New Order</h3>
            <div class="space-y-4">
                <input type="text" id="orderID_input" placeholder="Order ID (e.g. #8830)" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                <input type="text" id="customerName_input" placeholder="Customer Name" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                <select id="orderStatus_input" class="w-full p-3 bg-gray-100 rounded-xl outline-none">
                    <option value="Pending">Pending</option>
                    <option value="In Transit">In Transit</option>
                    <option value="Delivered">Delivered</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="handleSaveOrder()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600">Save Order</button>
                    <button onclick="closeOrderModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('kadambaas_orders')) || [];

        function saveOrder() {
            const id = document.getElementById('orderID').value;
            const name = document.getElementById('customerName').value;
            const status = document.getElementById('orderStatus').value;

            if (id && name) {
                // Use a consistent ID format and include status
                orders.push({ id, name, status, timestamp: Date.now() });
                localStorage.setItem('kadambaas_orders', JSON.stringify(orders));
                closeOrderModal();
                renderOrders();
            }
        }

        // ADD THIS: Allows status updates to be reflected on this page
        function changeStatus(timestamp, newStatus) {
            const index = orders.findIndex(o => o.timestamp === timestamp);
            if (index !== -1) {
                orders[index].status = newStatus;
                localStorage.setItem('kadambaas_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function renderOrders() {
            const list = document.getElementById('orderList');
            // ... (keep your existing counter logic) ...
            
            list.innerHTML = orders.map(o => `
                <tr class="border-b">
                    <td class="px-6 py-4 font-bold">${o.id}</td>
                    <td class="px-6 py-4">${o.name}</td>
                    <td class="px-6 py-4">
                        <select onchange="changeStatus(${o.timestamp}, this.value)" class="rounded-full px-3 py-1 text-xs font-bold">
                            <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="In Transit" ${o.status === 'In Transit' ? 'selected' : ''}>In Transit</option>
                            <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteOrder(${o.timestamp})" class="text-red-400">🗑 Remove</button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
