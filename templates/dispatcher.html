<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFF9F6; }
        .cyan-header { background: linear-gradient(90deg, #0891b2 0%, #06b6d4 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <header class="cyan-header px-8 py-4 flex justify-between items-center text-white shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-lg">🚚</div>
            <h1 class="font-bold text-xl tracking-tighter">KADAMBAAS</h1>
        </div>
        <div class="flex items-center gap-6 text-sm font-medium">
            <span class="bg-white/20 px-3 py-1 rounded-full border border-white/30">Dispatch Portal</span>
            <a href="login.html" class="opacity-80 hover:opacity-100 flex items-center gap-1">Logout →</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl border-t-8 border-cyan-500 card-shadow">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Available Vessels</p>
                <div class="flex items-end gap-2 mt-2">
                    <span id="vessel-count" class="text-4xl font-black text-cyan-600">42</span>
                    <span class="text-gray-400 mb-1 font-semibold">Units</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl border-t-8 border-orange-500 card-shadow">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Pending Dispatch</p>
                <div class="flex items-end gap-2 mt-2">
                    <span id="pending-count" class="text-4xl font-black text-orange-500">0</span>
                    <span class="text-gray-400 mb-1 font-semibold">Orders</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl border-t-8 border-emerald-500 card-shadow">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Vessel Efficiency</p>
                <div class="flex items-end gap-2 mt-2">
                    <span class="text-4xl font-black text-emerald-600">94%</span>
                    <span class="text-gray-400 mb-1 font-semibold">Return Rate</span>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <h2 class="text-2xl font-bold text-[#1A2B48] flex items-center gap-2">
                    <span>📦</span> Orders Awaiting Dispatch
                </h2>
                <div class="bg-white rounded-[2rem] overflow-hidden card-shadow border border-gray-100">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Order Info</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Current Status</th>
                                <th class="px-6 py-4 text-right text-[10px] font-bold text-gray-400 uppercase tracking-widest">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dispatch-list">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-2xl font-bold text-[#1A2B48]">Vessel Tracker</h2>
                <div class="bg-white p-6 rounded-[2rem] card-shadow border border-gray-100">
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 block mb-2">ADD VESSELS (Check-In)</label>
                            <input type="number" id="vesselInput" placeholder="Qty" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-cyan-400 text-xl font-bold">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateVessels('add')" class="flex-1 bg-cyan-600 text-white font-bold py-3 rounded-xl hover:bg-cyan-700 transition">+ Add</button>
                            <button onclick="updateVessels('remove')" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition">- Use</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load Orders from LocalStorage
        function loadDispatchOrders() {
            const list = document.getElementById('dispatch-list');
            const orders = JSON.parse(localStorage.getItem('kadambaas_orders')) || [];
            
            // Only show orders that are NOT Delivered
            const pending = orders.filter(o => o.status !== 'Delivered');
            document.getElementById('pending-count').innerText = pending.length;

            if (pending.length === 0) {
                list.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-gray-400 italic">No orders ready for dispatch.</td></tr>`;
                return;
            }

            list.innerHTML = pending.map(o => `
                <tr class="border-b border-gray-50 hover:bg-cyan-50/30 transition">
                    <td class="px-6 py-5">
                        <div class="font-bold text-gray-800">${o.id}</div>
                        <div class="text-xs text-gray-500">${o.name}</div>
                    </td>
                    <td class="px-6 py-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold bg-orange-100 text-orange-600 uppercase">${o.status}</span>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="assignDriver('${o.id}')" class="text-cyan-600 font-bold text-sm hover:underline">Assign Driver →</button>
                    </td>
                </tr>
            `).join('');
        }

        // Vessel Management
        let currentVessels = parseInt(localStorage.getItem('vessel_count')) || 42;
        document.getElementById('vessel-count').innerText = currentVessels;

        function updateVessels(action) {
            const val = parseInt(document.getElementById('vesselInput').value);
            if(!val) return;

            if(action === 'add') currentVessels += val;
            else currentVessels -= val;

            localStorage.setItem('vessel_count', currentVessels);
            document.getElementById('vessel-count').innerText = currentVessels;
            document.getElementById('vesselInput').value = '';
        }

        function assignDriver(id) {
            alert("Driver Assignment logic for " + id + " initiated. Finding nearest driver...");
        }

        document.addEventListener('DOMContentLoaded', loadDispatchOrders);
    </script>
</body>
</html>
