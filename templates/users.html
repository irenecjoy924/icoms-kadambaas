<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadambaas - Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFF9F6; } 
        .modal-bg { background-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-[#E31E24] to-[#FF5F1F] px-8 py-4 text-white flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3"><h1 class="font-bold text-xl">KADAMBAAS</h1></div>
        <div class="flex gap-4 items-center text-sm">
            <a href="admin.html" class="hover:underline opacity-80">🏠 Dashboard</a>
            <span>/ Manage Users</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-8 w-full">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-4xl font-bold text-[#1A2B48]">Manage Users</h2>
            <button onclick="toggleModal()" class="bg-[#007AFF] hover:bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold shadow-lg transition-all">+ Add User</button>
        </div>

        <div class="relative mb-8">
            <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="Search users by name or role..." class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
            <span class="absolute left-4 top-4 text-gray-400">🔍</span>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs uppercase font-bold">
                    <tr>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Designation</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="userModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 class="text-2xl font-bold mb-4">Add New User</h3>
            
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Full Name</label>
            <input type="text" id="newName" placeholder="Enter Full Name" class="w-full p-3 bg-gray-100 rounded-xl mb-4 outline-none">
            
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Designation</label>
            <input type="text" id="newDesignation" placeholder="e.g. Supervisor, Admin" class="w-full p-3 bg-gray-100 rounded-xl mb-6 outline-none">
            
            <div class="flex gap-3">
                <button onclick="addUser()" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition">Save User</button>
                <button onclick="toggleModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-300 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Toggle Modal Visibility
        function toggleModal() {
            const modal = document.getElementById('userModal');
            modal.classList.toggle('hidden');
        }

        // 2. Fetch and Render Users from DB
        async function renderUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                const list = document.getElementById('userList');
                list.innerHTML = users.map((user) => `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-semibold text-gray-700">${user.name}</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">
                                ${user.role}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="removeUser(${user.id})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition font-bold text-sm">
                                🗑️ Remove
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error fetching users:", err);
            }
        }

        // 3. Save User to DB
        async function addUser() {
            console.log("Save button clicked"); // Debugging line
            const nameField = document.getElementById('newName');
            const roleField = document.getElementById('newDesignation');

            if (!nameField.value || !roleField.value) {
                alert("Please fill in both Name and Designation.");
                return;
            }

            const userData = {
                name: nameField.value.trim(),
                role: roleField.value.trim()
            };

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    nameField.value = '';
                    roleField.value = '';
                    toggleModal();
                    renderUsers(); // Refresh the table
                } else {
                    const errorData = await response.json();
                    alert("Error: " + errorData.message);
                }
            } catch (error) {
                console.error("Critical Error:", error);
                alert("Could not connect to the server.");
            }
        }

        // 4. Remove user from DB
        async function removeUser(id) {
            if(confirm("Are you sure you want to remove this user?")) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                renderUsers();
            }
        }

        // 5. Search/Filter Users
        function filterUsers() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let rows = document.getElementById('userList').getElementsByTagName('tr');
            for (let row of rows) {
                let name = row.getElementsByTagName('td')[0].innerText.toLowerCase();
                let role = row.getElementsByTagName('td')[1].innerText.toLowerCase();
                row.style.display = (name.includes(input) || role.includes(input)) ? "" : "none";
            }
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', renderUsers);
    </script>
</body>
</html>
