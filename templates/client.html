<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCFB; }
        .map-placeholder {
            background-image: url('https://api.mapbox.com/styles/v1/mapbox/streets-v11/static/80.27,13.08,12,0/600x400?access_token=YOUR_TOKEN_HERE');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <header class="bg-white px-8 py-4 flex justify-between items-center shadow-sm border-b border-orange-100">
        <div class="font-black text-2xl text-orange-600 tracking-tighter italic">KADAMBAAS</div>
        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest bg-gray-50 px-3 py-1 rounded-full">
            Order Tracking Portal
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">
        <div class="bg-white rounded-[2.5rem] p-2 shadow-xl shadow-orange-100/50 border border-orange-50 overflow-hidden">
            <div class="relative h-64 rounded-[2rem] map-placeholder flex items-center justify-center">
                <div class="relative">
                    <div class="absolute inset-0 bg-orange-500 rounded-full animate-ping opacity-75"></div>
                    <div class="relative bg-orange-600 p-3 rounded-full text-white shadow-lg">📍</div>
                </div>
                <div class="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-md p-3 rounded-2xl flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-700">Supervisor is on the move</span>
                    <span class="text-[10px] text-orange-600 font-black animate-pulse">● LIVE</span>
                </div>
            </div>
        </div>

        <div class="bg-gradient-to-br from-orange-500 to-orange-700 rounded-[2.5rem] p-8 text-white shadow-xl shadow-orange-200">
            <p class="text-orange-100 text-xs font-bold uppercase tracking-widest mb-2">Estimated Arrival</p>
            <div class="flex items-baseline gap-2">
                <span id="client-eta" class="text-6xl font-black">--</span>
                <span class="text-xl font-bold opacity-80">MINS</span>
            </div>
            <div class="mt-6 pt-6 border-t border-white/20 flex justify-between items-center">
                <div>
                    <p class="text-[10px] opacity-70 uppercase">Order ID</p>
                    <p id="client-order-id" class="font-bold">#----</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-70 uppercase">Status</p>
                    <p id="client-status" class="font-bold text-orange-200">Tracking...</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="text-orange-500">📋</span> Order Summary
            </h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center py-2 border-b border-gray-50">
                    <span class="text-sm text-gray-500">Customer</span>
                    <span id="client-name" class="text-sm font-bold text-gray-800">---</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <span class="text-sm text-gray-500">Live Location</span>
                    <span id="client-coords" class="text-[10px] font-mono text-orange-600 bg-orange-50 px-2 py-1 rounded-md">Waiting for GPS...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function syncClientData() {
            // Get orders from LocalStorage
            const orders = JSON.parse(localStorage.getItem('kadambaas_orders')) || [];
            
            // For this demo, we'll track the most recent order added
            if (orders.length > 0) {
                const latestOrder = orders[orders.length - 1];
                
                document.getElementById('client-order-id').innerText = latestOrder.id;
                document.getElementById('client-name').innerText = latestOrder.name;
                document.getElementById('client-status').innerText = latestOrder.status.toUpperCase();
                
                // Get ETA from what Supervisor updated (if any)
                // In a real app, this would be a separate key in DB
                const savedEta = localStorage.getItem('last_eta') || "15"; 
                document.getElementById('client-eta').innerText = savedEta;

                // Get GPS Coords from what Supervisor captured
                const lat = localStorage.getItem('last_lat') || "13.08";
                const lon = localStorage.getItem('last_lon') || "80.27";
                document.getElementById('client-coords').innerText = `LAT: ${lat} | LON: ${lon}`;
            }
        }

        // Auto-refresh every 5 seconds to simulate live tracking
        setInterval(syncClientData, 5000);
        window.onload = syncClientData;
    </script>
</body>
</html>
